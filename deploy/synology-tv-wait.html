<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="control-addmylegacy" content="synology-wait-page">
  <title>Synology — waiting for dashboard</title>
  <style>
    html, body { height: 100%; margin: 0; background: #0b0f14; color: #f4f7fb; font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .shell { align-items: center; display: flex; flex-direction: column; height: 100%; justify-content: center; padding: 48px; text-align: center; }
    .badge { background: rgba(251, 191, 36, 0.16); border: 1px solid rgba(251, 191, 36, 0.45); border-radius: 999px; color: #fbbf24; font-size: 18px; font-weight: 700; letter-spacing: 0.14em; margin-bottom: 24px; padding: 10px 18px; text-transform: uppercase; }
    h1 { color: #fbbf24; font-size: 56px; margin: 0 0 16px; }
    p { color: #4fd1c5; font-size: 28px; line-height: 1.4; max-width: 960px; }
    .meta { color: #9aa8bc; font-size: 22px; margin-top: 16px; }
  </style>
</head>
<body>
  <main class="shell">
    <p class="badge">Synology NAS gateway</p>
    <h1>Still waiting for control dashboard</h1>
    <p>The Synology NAS is reachable. Waiting for the Docker container to respond.</p>
    <p class="meta" id="status">Checking service…</p>
  </main>
  <script>
    (function () {
      "use strict";
      var HEALTH_URL = "https://control.addmylegacy.com/health/";
      var HOME_URL = "https://control.addmylegacy.com/";
      var POLL_MS = 3000;
      var statusEl = document.getElementById("status");

      function setStatus(text) {
        if (statusEl) statusEl.textContent = text;
      }

      function tick() {
        var xhr = new XMLHttpRequest();
        xhr.open("GET", HEALTH_URL, true);
        xhr.timeout = 4000;
        xhr.onreadystatechange = function () {
          if (xhr.readyState !== 4) return;
          if (xhr.status === 200 && xhr.responseText && xhr.responseText.indexOf("ok") !== -1) {
            setStatus("Service is ready. Opening dashboard…");
            window.location.href = HOME_URL;
            return;
          }
          setStatus("Synology gateway — container still starting…");
          window.setTimeout(tick, POLL_MS);
        };
        xhr.onerror = function () { setStatus("Synology gateway — container still starting…"); window.setTimeout(tick, POLL_MS); };
        xhr.ontimeout = function () { setStatus("Synology gateway — container still starting…"); window.setTimeout(tick, POLL_MS); };
        xhr.send();
      }

      tick();
    })();
  </script>
</body>
</html>
