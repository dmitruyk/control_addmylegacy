# Nginx example for control.addmylegacy.com
#
# The TV showed "page not found" (404) during deploy because:
#   1. error_page pointed to /updating.html but the file was not on the nginx host, OR
#   2. Synology reverse proxy returned 404 when the container port was closed.
#
# This config fixes both by proxying errors to Django /updating/ first, then a host file.
#
# Install host fallback (required when the container is fully stopped):
#   ./deploy/install-updating-placeholder.sh
#   # or: make install-nginx-placeholder NGINX_ROOT=/var/www/control-addmylegacy
#
# Test while the app is running:
#   curl -I https://control.addmylegacy.com/updating/
#   curl -I https://control.addmylegacy.com/updating.html

upstream control_addmylegacy_backend {
  server 127.0.0.1:8000;
  keepalive 8;
}

server {
  listen 443 ssl http2;
  server_name control.addmylegacy.com;

  # ssl_certificate ...
  # ssl_certificate_key ...

  # Host copy of deploy/updating.html — used only when the container is down.
  root /var/www/control-addmylegacy;

  location = /updating.html {
    alias /var/www/control-addmylegacy/updating.html;
    default_type text/html;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location = /updating/ {
    proxy_pass http://control_addmylegacy_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 2s;
    proxy_read_timeout 10s;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location /health/ {
    proxy_pass http://control_addmylegacy_backend;
    proxy_connect_timeout 2s;
    proxy_read_timeout 2s;
    proxy_send_timeout 2s;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location / {
    proxy_pass http://control_addmylegacy_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout 120s;

    proxy_intercept_errors on;
    error_page 404 502 503 504 = @tv_updating;
  }

  # Prefer Django /wait/ while the container responds; fall back to host file.
  location @tv_updating {
    proxy_pass http://control_addmylegacy_backend/wait/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 2s;
    proxy_read_timeout 5s;
    proxy_intercept_errors on;
    error_page 502 503 504 = @tv_updating_static;
  }

  location @tv_updating_static {
    rewrite ^ /updating.html break;
    root /var/www/control-addmylegacy;
    default_type text/html;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }
}

# Synology Reverse Proxy (GUI only, no custom nginx):
# - When the container is DOWN, Synology often returns 404/502 with no custom page.
# - You MUST install the host file:
#     ./deploy/install-updating-placeholder.sh /volume1/web/control-addmylegacy
# - Then add a second reverse-proxy rule OR custom nginx include pointing errors to
#   /updating.html (Synology DSM 7.2+ may allow custom error documents in Web Station).
# - Easier deploy workflow: set TV_MAINTENANCE_MODE=true in .env before restart;
#   the running container shows /updating/ until you set it back to false.
