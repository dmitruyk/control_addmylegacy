# Nginx example for control.addmylegacy.com
#
# Synology shows a gray 404 circle when the Docker container is stopped.
# Synology's 404 page XHRs GET /missing — if that returns 200 + HTML, it
# replaces the 404 screen automatically. Install the host file first:
#   ./deploy/install-updating-placeholder.sh /volume1/web/control-addmylegacy
#
# Test:
#   curl -I https://control.addmylegacy.com/missing   # must be 200
#   curl -I https://control.addmylegacy.com/health/

upstream control_addmylegacy_backend {
  server 127.0.0.1:8000;
  keepalive 8;
}

server {
  listen 443 ssl http2;
  server_name control.addmylegacy.com;

  # ssl_certificate ...
  # ssl_certificate_key ...

  root /volume1/web/control-addmylegacy;

  # CRITICAL: Synology 404 hook — must work when Docker is DOWN.
  # Serve from NAS disk, not the container.
  location = /missing {
    alias /volume1/web/control-addmylegacy/missing;
    default_type text/html;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location = /updating.html {
    alias /volume1/web/control-addmylegacy/updating.html;
    default_type text/html;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location = /updating/ {
    proxy_pass http://control_addmylegacy_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 2s;
    proxy_read_timeout 10s;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location /health/ {
    proxy_pass http://control_addmylegacy_backend;
    proxy_connect_timeout 2s;
    proxy_read_timeout 2s;
    proxy_send_timeout 2s;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location / {
    proxy_pass http://control_addmylegacy_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout 120s;

    proxy_intercept_errors on;
    error_page 404 502 503 504 = @tv_updating;
  }

  location @tv_updating {
    proxy_pass http://control_addmylegacy_backend/wait/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 2s;
    proxy_read_timeout 5s;
    proxy_intercept_errors on;
    error_page 502 503 504 = @tv_updating_static;
  }

  location @tv_updating_static {
    rewrite ^ /updating.html break;
    root /volume1/web/control-addmylegacy;
    default_type text/html;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }
}
