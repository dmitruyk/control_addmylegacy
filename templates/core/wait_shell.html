<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="control-addmylegacy" content="wait-page">
  <title>{{ SITE_NAME }} — Still waiting</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      cursor: url("data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"), none !important;
    }

    body {
      background-color: #0b0f14;
      background-image: radial-gradient(circle at top, #152033 0%, #0b0f14 55%);
      color: #f4f7fb;
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    body, body * {
      cursor: url("data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"), none !important;
    }

    .tv-updating {
      align-items: center;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      height: 100%;
      justify-content: center;
      padding: 48px;
      text-align: center;
      width: 100%;
    }

    .tv-updating-badge {
      background: rgba(251, 191, 36, 0.16);
      border: 1px solid rgba(251, 191, 36, 0.45);
      border-radius: 999px;
      color: #fbbf24;
      display: none;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.14em;
      margin: 0 0 24px;
      padding: 10px 18px;
      text-transform: uppercase;
    }

    .tv-updating-synology .tv-updating-title { color: #fbbf24; }
    .tv-updating-synology .tv-updating-badge { display: block; }

    .tv-updating-mark {
      align-items: center;
      background-image: linear-gradient(135deg, #2dd4bf, #2563eb);
      border-radius: 20px;
      color: #041018;
      display: flex;
      font-size: 40px;
      font-weight: 800;
      height: 112px;
      justify-content: center;
      letter-spacing: 0.08em;
      margin-bottom: 40px;
      width: 112px;
    }

    .tv-updating-title { font-size: 56px; font-weight: 700; line-height: 1.15; margin: 0 0 20px; }
    .tv-updating-message { color: #4fd1c5; font-size: 32px; line-height: 1.4; margin: 0 0 16px; max-width: 960px; }
    .tv-updating-meta { color: #9aa8bc; font-size: 22px; margin: 0; }

    .tv-updating-spinner {
      border: 4px solid #243041;
      border-radius: 50%;
      border-top-color: #4fd1c5;
      height: 56px;
      margin-bottom: 36px;
      width: 56px;
      animation: tv-spin 1s linear infinite;
    }

    @keyframes tv-spin { to { transform: rotate(360deg); } }

    @media screen and (min-width: 1600px) {
      .tv-updating-title { font-size: 72px; }
      .tv-updating-message { font-size: 40px; }
      .tv-updating-meta { font-size: 28px; }
      .tv-updating-badge { font-size: 18px; }
    }
  </style>
</head>
<body data-health-poll-seconds="{{ poll_seconds }}">
  <main id="tv-updating" class="tv-updating" role="main" aria-live="polite" aria-busy="true">
    <p class="tv-updating-badge" id="tv-updating-badge">Synology gateway</p>
    <div class="tv-updating-mark" aria-hidden="true">AML</div>
    <div class="tv-updating-spinner" aria-hidden="true"></div>
    <h1 class="tv-updating-title" id="tv-updating-title">Still waiting</h1>
    <p class="tv-updating-message" id="tv-updating-message">The control dashboard will appear automatically when the service is ready.</p>
    <p class="tv-updating-meta" id="tv-updating-meta">Checking control dashboard…</p>
  </main>
  {% load static %}
  <script src="{% static 'js/tv-boot.js' %}?v={{ STATIC_BUILD_ID }}"></script>
</body>
</html>
